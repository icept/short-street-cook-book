{{- define "main" }}
<article class="markdown">
  <h1>{{ .Title }}</h1>
  {{- if or .Params.serves .Params.time }}
  <p class="recipe-meta">
    {{- with .Params.serves }}<span>Serves {{ . }}</span>{{- end }}
    {{- with .Params.time }}<span>{{ . }}</span>{{- end }}
  </p>
  {{- end }}
  {{- .Content }}
</article>
{{- end }}
